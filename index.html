<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#4a5535">
<title>RDP Pro - Redirecionando</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script>
  const target = new URL("paciente.html", location.href);
  target.search = location.search;
  target.hash = location.hash;
  location.replace(target.href);
</script>
</head>
<body>
  <p>Redirecionando para <a id="patient-link" href="paciente.html">RDP Pro</a>...</p>
  <script>
    document.getElementById("patient-link").href = `paciente.html${location.search}${location.hash}`;
  </script>
</body>
</html>
